<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>k❤️</title>
    <style>
        body {
    background-color: red;
    margin: 0;
}

.painel {
    margin: 20px auto;
    background-color: white;

    width: 90%;           /* ocupa quase toda a tela */
    max-width: 500px;     /* limite no desktop */
    min-height: 400px;    /* altura mínima */

    border-radius: 20px;
    text-align: center;
    padding: 20px;
    box-sizing: border-box;

    font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
}

.painel img {
    width: 100%;
    max-width: 200px;
    height: auto;
}

#sim, #nao {
    height: 40px;
    width: 80px;
    background-color: red;
    border: 2px solid white;
    border-radius: 10px;
    color: white;
    margin: 10px;
}

#sim{
    margin-left: -25%;
}

#nao {
    position: absolute;
}

.carta-romantica {
    margin: 30px auto;
    width: 90%;
    max-width: 300px;
    text-align: center;
    cursor: pointer;
}

/* coração */
.coracao {
    font-size: 30px;
    margin-bottom: 5px;
    animation: pulse 1.2s infinite;
}

@keyframes pulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.2); }
    100% { transform: scale(1); }
}

/* base */
.envelope-base {
    position: relative;
    width: 100%;
    height: 200px;
    background: #ffb3b3;
    border-radius: 10px;
    overflow: hidden;
}

.envelope-base {
    overflow: visible; /* permite sair pra fora */
    position: relative;
}

/* abas do envelope */
.aba-esq, .aba-dir, .aba-topo {
    position: absolute;
    width: 100%;
    height: 100%;
    background: #ff8080;
    transition: 0.8s;
}

/* lado esquerdo */
.aba-esq {
    clip-path: polygon(0 0, 50% 50%, 0 100%);
}

/* lado direito */
.aba-dir {
    clip-path: polygon(100% 0, 50% 50%, 100% 100%);
}

/* tampa */
.aba-topo {
    clip-path: polygon(0 0, 100% 0, 50% 50%);
    transform-origin: top;
    z-index: 2;
}

/* mensagem */
.mensagem {
    position: absolute;
    width: 85%;
    left: 7.5%;
    top: 60px;

    padding: 15px;
    border-radius: 8px;

    font-size: 13px;
    line-height: 1.6;
    text-align: left;

    opacity: 0;

    transform: translateY(120px) scale(0.9);
    transition: all 0.9s cubic-bezier(.68,-0.55,.27,1.55);

    z-index: 5;

    /* 📜 PAPEL ENVELHECIDO */
    background: linear-gradient(135deg, #fdf6e3, #f5e6c8);
    box-shadow: 
        0 15px 25px rgba(0,0,0,0.25),
        inset 0 0 10px rgba(0,0,0,0.08);

    border: 1px solid #e0cfa9;
}

.mensagem::before {
    content: "";
    position: absolute;
    left: 35px;
    top: 0;
    width: 2px;
    height: 100%;
    background: rgba(255, 0, 0, 0.2); /* linha vermelha lateral */
}

.mensagem::after {
    content: "";
    position: absolute;
    left: 0;
    top: 0;
    width: 100%;
    height: 100%;

    background-image: linear-gradient(
        to bottom,
        transparent 24px,
        rgba(0,0,255,0.15) 25px
    );

    background-size: 100% 25px;
    pointer-events: none;
}

.mensagem p {
    margin-left: 45px;
    font-family: 'Courier New', monospace; /* estilo escrito */
}

.mensagem {
    filter: contrast(1.05) brightness(0.98);
}

/* estado aberto */
.carta-romantica.aberta .aba-topo {
    transform: rotateX(180deg);
    z-index: 1;
}

.carta-romantica.aberta .mensagem {
    opacity: 1;
    transform: translateY(-80px) scale(1.05);
}

.carta-romantica.aberta {
    transform: translateY(-5px);
    transition: 0.5s;
}

#paginas {
    min-height: 120px;
}

#proximo {
    margin-top: 10px;
    background: red;
    color: white;
    border: none;
    border-radius: 8px;
    padding: 5px 10px;
    cursor: pointer;
}
    </style>
</head>
<body>
    <div class="painel">
        <h1>Feliz Dia dos Namorados❤️</h1>

         <img src="https://gifman.net/wp-content/uploads/2019/06/ursinho-fofo-apaixonado.gif" alt="">

        <h2>Aceita namorar comigo?</h2>

        <a href="https://www.youtube.com/watch?v=oRvND-r57Us" target="_blank"><button id="sim">Sim!</button></a>
        <button onmouseover="fuja()" id="nao">Não!</button>

    </div>

    <div class="carta-romantica" onclick="abrirCarta(this)">
    <div class="coracao">Clique aqui❤️</div>

    <div class="envelope-base">
        <div class="mensagem">
            <div id="paginas"></div>
        <button id="proximo" onclick="proximaPagina()">➡️</button>
        </div>

        <div class="aba-esq"></div>
        <div class="aba-dir"></div>
        <div class="aba-topo"></div>
    </div>
</div>
    
    <script>
        function fuja(){
            var botaonao = document.getElementById("nao")

            var largurajanela = window.innerWidth;
            var alturajanela = window.innerHeight;

            var maxX = largurajanela - botaonao.offsetWidth;
            var maxY = alturajanela - botaonao.offsetHeight;

            var aleatorioX = Math.floor(Math.random() * maxX);
            var aleatorioY = Math.floor(Math.random() * maxY)

            botaonao.style.left = aleatorioX + "px";
            botaonao.style.top = aleatorioY + "px";
        }

        function abrirCarta(el){
    el.classList.add("aberta");
    escrever();
}

const texto = `É Minha gata o momento que vc tanto esperou chegou, quando vc ler isso mto provavelmente eu já coloquei uma linda aliança em seu dedo. No momento em que estou escrevendo isso a gente tem 6 meses e 19 dias juntos e eu só sei que  a cada dia e hora que passe eu só fico mais apaixonado por vc e sinceramente só tenho mais certeza que vc é a mulher que eu quero me casar e levar para a vida toda. Muito Obrigada por ser tão atenciosa, carinhosa e muitooooo paciente, eu não tenho nada a reclamar, afinal vc é essa menina maravilhosamente linda, muito incrível e absurdamente cheirosa e é isso meu amor, eu prometo te amar pra toda eternidade e em todas as vidas minha princesa ❤️💞`;

let paginas = [];
let paginaAtual = 0;

function dividirTexto(){
    const limite = 500; // quantidade de caracteres por página
    for(let i = 0; i < texto.length; i += limite){
        paginas.push(texto.substring(i, i + limite));
    }
}

function mostrarPagina(){
    document.getElementById("paginas").innerText = paginas[paginaAtual];
}

function proximaPagina(){
    if(paginaAtual < paginas.length - 1){
        paginaAtual++;
        mostrarPagina();
    }
}

function iniciarCarta(){
    dividirTexto();
    mostrarPagina();
}

function abrirCarta(el){
    el.classList.add("aberta");
    iniciarCarta();
}
    </script>
</body>
</html>
