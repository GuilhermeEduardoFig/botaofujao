<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>k❤️</title>
    <style>
        body {
    background-color: red;
    margin: 0;
}

.painel {
    margin: 20px auto;
    background-color: white;

    width: 90%;           /* ocupa quase toda a tela */
    max-width: 500px;     /* limite no desktop */
    min-height: 400px;    /* altura mínima */

    border-radius: 20px;
    text-align: center;
    padding: 20px;
    box-sizing: border-box;

    font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
}

.painel img {
    width: 100%;
    max-width: 200px;
    height: auto;
}

#sim, #nao {
    height: 40px;
    width: 80px;
    background-color: red;
    border: 2px solid white;
    border-radius: 10px;
    color: white;
    margin: 10px;
}

#nao {
    position: absolute;
}
    </style>
</head>
<body>
    <div class="painel">
        <h1>Feliz Dia dos Namorados❤️</h1>

         <img src="https://gifman.net/wp-content/uploads/2019/06/ursinho-fofo-apaixonado.gif" alt="">

        <h2>Aceita namorar comigo?</h2>

        <a href="https://www.youtube.com/watch?v=oRvND-r57Us" target="_blank"><button id="sim">Sim!</button></a>
        <button onmouseover="fuja()" id="nao">Não!</button>

    </div>

    <script>
        function fuja(){
            var botaonao = document.getElementById("nao")

            var largurajanela = window.innerWidth;
            var alturajanela = window.innerHeight;

            var maxX = largurajanela - botaonao.offsetWidth;
            var maxY = alturajanela - botaonao.offsetHeight;

            var aleatorioX = Math.floor(Math.random() * maxX);
            var aleatorioY = Math.floor(Math.random() * maxY)

            botaonao.style.left = aleatorioX + "px";
            botaonao.style.top = aleatorioY + "px";
        }
    </script>
</body>
</html>
